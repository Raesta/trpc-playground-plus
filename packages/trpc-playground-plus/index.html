<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>tRPC Playground</title>
    <style>
      html, body, #root {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        overflow: hidden;
        color: #e6edf3;
      }

      *, *:before, *:after {
        box-sizing: inherit;
      }

      p {
        color: #e6edf3;
      }

      code {
        font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
        font-size: 13px;
        background: #1a1a2e;
        padding: 2px 6px;
        border-radius: 4px;
        color: #7dd3fc;
      }

      body {
        line-height: 1.5;
        overflow-x: hidden;
        background-color: #0d1117;
      }

      #root {
        display: flex;
        flex-direction: column;
      }

      .cm-editor {
        height: 100%;
        width: 100%;
      }

      .cm-scroller {
        overflow: auto !important;
      }

      @keyframes slideIn {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }

      @keyframes slideOut {
        from { transform: translateX(0); }
        to { transform: translateX(100%); }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }

      .active-tab {
        border-bottom-color: #161b22 !important;
      }

      .tab:hover {
        background-color: #21262d;
      }

      .tab-close:hover {
        color: #e6edf3;
      }

      .tab-edit-input {
        background-color: #1a1a2e;
        color: #e6edf3;
        border: 1px solid #30363d;
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 14px;
        outline: none;
      }

      .tab-edit-input:focus {
        background-color: #2d2d4a;
        border-color: #58a6ff;
        box-shadow: 0 0 0 2px rgba(56, 139, 253, 0.4);
      }

      .tab span {
        cursor: pointer;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #161b22;
      }
      ::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444c56;
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0;">
    <div id="root" style="width: 100%; height: 100%; background-color: #0d1117;"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
